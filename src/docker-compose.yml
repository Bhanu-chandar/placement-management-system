# ================================================
# PMS — Docker Compose (Local Development)
# ================================================
# Usage:  docker-compose up --build
# ================================================

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pms-backend
    ports:
      - '5001:5000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - FRONTEND_URL=http://localhost:5173
      - UNIVERSITY_EMAIL_DOMAIN=uohyd.ac.in
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pms-frontend
    ports:
      - '3001:80'
    depends_on:
      - backend
    restart: unless-stopped

  # For local dev without Docker, use:
  #   cd backend && npm run dev
  #   cd frontend && npm run dev
